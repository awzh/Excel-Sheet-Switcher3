name: Build Excel Sheet Switcher

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Install Ninja
      shell: powershell
      run: choco install ninja -y --no-progress

    - name: Configure CMake
      shell: cmd
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      shell: cmd
      run: cmake --build build

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: SheetSwitcher-${{ matrix.arch }}
        path: build/ExcelSheetSwitcher.exe
