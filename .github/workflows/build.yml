name: Build Excel Sheet Switcher

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch == 'x64' && 'x64' || 'Win32' }}

    - name: Build
      run: cmake --build build --config Release

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: SheetSwitcher-${{ matrix.arch }}
        path: build/Release/ExcelSheetSwitcher.exe
